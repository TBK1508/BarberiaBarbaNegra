<h2>📅 Solicitud de Cita</h2>

<div class="card">
<form action="#" method="POST">

    <label>Nombre completo:</label><br>
    <input type="text" name="nombre" required><br><br>

    <label>Teléfono:</label><br>
    <input type="tel" name="telefono" required><br><br>

    <label>Servicio:</label><br>
    <select name="servicio" required>
        <option value="">Selecciona un servicio</option>
        <option>Corte de cabello</option>
        <option>Fade / Degradado</option>
        <option>Barba</option>
        <option>Paquete completo</option>
    </select><br><br>

    <label>Fecha:</label><br>
    <input type="date" name="fecha" required><br><br>

    <label>Hora:</label><br>
    <input type="time" name="hora" required><br><br>

    <label>Notas adicionales:</label><br>
    <textarea name="mensaje" rows="3" placeholder="Ej: estilo deseado, referencia, etc."></textarea><br><br>

    <button type="submit" class="btn reserve">⚓ Enviar solicitud</button>

</form>
</div>
